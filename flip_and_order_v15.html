<!DOCTYPE html>
<html>

<body>
    <img id="source" src="assets/anim_front_basketball_v14_righty_1769838898193.png" style="display:none;">
    <canvas id="canvas" width="1024" height="1024"></canvas>
    <script>
        window.onload = function () {
            const img = document.getElementById('source');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // Clear
            ctx.clearRect(0, 0, 1024, 1024);

            const w = 1024;
            const h = 1024;
            const colW = w / 3;
            const rowH = h / 2;

            // Function to draw a cell flipped
            function drawFlipped(srcX, srcY, destX, destY) {
                ctx.save();
                ctx.translate(destX + colW, destY);
                ctx.scale(-1, 1);
                ctx.drawImage(img, srcX, srcY, colW, rowH, 0, 0, colW, rowH);
                ctx.restore();
            }

            // Process v14_righty (Sequence: 1, 2, 3 / 4, 5, 6)
            // We map Source 1 -> Dest 1, Source 2 -> Dest 2, etc.

            // Row 1
            drawFlipped(0, 0, 0, 0);          // Frame 1 (Set Point) -> Pos 1
            drawFlipped(colW, 0, colW, 0);    // Frame 2 (Release) -> Pos 2
            drawFlipped(colW * 2, 0, colW * 2, 0);// Frame 3 (High Jump) -> Pos 3

            // Row 2
            drawFlipped(0, rowH, 0, rowH);       // Frame 4 (Follow Through) -> Pos 4
            drawFlipped(colW, rowH, colW, rowH); // Frame 5 (Ball Drop) -> Pos 5
            drawFlipped(colW * 2, rowH, colW * 2, rowH); // Frame 6 (Full Ball) -> Pos 6

            // Draw a marker to confirm render
            ctx.fillStyle = '#00FF00';
            ctx.fillRect(0, 0, 20, 20);
        };
    </script>
</body>

</html>
