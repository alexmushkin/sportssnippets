<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick Figure Animations Preview</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .card-mockup {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid #444;
        }

        .card-mockup h2 {
            font-size: 1rem;
            margin-bottom: 20px;
            color: #aaa;
        }

        /* 
           The Target Circle 
           - Matches 'card-icon' size roughly (74px -> scaled up for preview) 
           - Uses 2x3 Grid Logic:
             Width: 300% (3 cols)
             Height: 200% (2 rows)
        */
        .anim-sprite {
            width: 150px;
            height: 150px;
            background-repeat: no-repeat;
            background-size: 300% 200%;
            border: 4px solid #fff;
            border-radius: 50%;
            background-color: #000;
            cursor: pointer;

            /* Apply loop animation */
            animation: play-grid 0.8s steps(1) infinite;
        }

        /* 2x3 Grid Keyframes */
        @keyframes play-grid {
            0% {
                background-position: 0% 0%;
            }

            /* Row 1, Col 1 */
            16.6% {
                background-position: 50% 0%;
            }

            /* Row 1, Col 2 */
            33.3% {
                background-position: 100% 0%;
            }

            /* Row 1, Col 3 */
            50% {
                background-position: 0% 100%;
            }

            /* Row 2, Col 1 */
            66.6% {
                background-position: 50% 100%;
            }

            /* Row 2, Col 2 */
            83.3% {
                background-position: 100% 100%;
            }

            /* Row 2, Col 3 */
            100% {
                background-position: 0% 0%;
            }
        }

        /* Asset References (Local Names) */
        .basketball {
            background-image: url('assets/anim_front_basketball_v26_final.png');
        }

        .baseball {
            background-image: url('assets/anim_front_baseball_v3_1769796228216.png');
        }

        .tennis {
            background-image: url('assets/anim_front_tennis_v2_1769795896646.png');
        }

        .football {
            background-image: url('assets/anim_front_football_black_bg.png');
        }

        .soccer {
            background-image: url('assets/anim_front_soccer_v2_1769795909211.png');
        }
    </style>
</head>

<body>
    <h1>"Towards Viewer" Animations</h1>

    <div class="preview-grid">
        <div class="card-mockup">
            <h2>Basketball</h2>
            <div class="anim-sprite basketball"></div>
        </div>

        <div class="card-mockup">
            <h2>Baseball</h2>
            <div class="anim-sprite baseball"></div>
        </div>

        <div class="card-mockup">
            <h2>Tennis</h2>
            <div class="anim-sprite tennis"></div>
        </div>

        <div class="card-mockup">
            <h2>Football</h2>
            <div class="anim-sprite football"></div>
        </div>

        <div class="card-mockup">
            <h2>Soccer</h2>
            <div class="anim-sprite soccer"></div>
        </div>
    </div>
</body>

</html>
