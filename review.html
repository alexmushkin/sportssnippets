<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Sheet Review</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 40px; text-align: center; }
        .sport-section { margin-bottom: 60px; border-bottom: 2px solid #eee; padding-bottom: 40px; }
        .sport-section:last-child { border: none; }
        h2 { margin-bottom: 20px; color: #333; }
        img { max-width: 100%; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        p { color: #666; margin-bottom: 10px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Unified Stick Figure Review</h1>

        <div class="sport-section">
            <h2>1. Basketball</h2>
            <p>Grid: 3x2 (6 Frames)</p>
            <img src="assets/review_basketball.png" alt="Basketball Sprite Sheet">
        </div>

        <div class="sport-section">
            <h2>2. Football</h2>
            <p>Grid: 3x2 (6 Frames)</p>
            <img src="assets/review_football.png" alt="Football Sprite Sheet">
        </div>

        <div class="sport-section">
            <h2>3. Baseball</h2>
            <p>Grid: 3x3 (9 Frames)</p>
            <img src="assets/review_baseball.png" alt="Baseball Sprite Sheet">
        </div>

        <div class="sport-section">
            <h2>4. Tennis</h2>
            <p>Grid: 3x3 (9 Frames)</p>
            <img src="assets/review_tennis.png" alt="Tennis Sprite Sheet">
        </div>

        <div class="sport-section">
            <h2>5. Soccer</h2>
            <p>Grid: 3x3 (9 Frames)</p>
            <img src="assets/review_soccer.png" alt="Soccer Sprite Sheet">
        </div>
    </div>
</body>
</html>
